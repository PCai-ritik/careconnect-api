version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: careconnect_postgres
    restart: always
    environment:
      - POSTGRES_USER=careconnect_admin
      - POSTGRES_PASSWORD=supersecretpassword
      - POSTGRES_DB=careconnect_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
